name: Deploy Python Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Show gcloud config
        run: gcloud config list

      - name: Create .env.yaml
        run: |
          cat <<EOF > .env.yaml
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          BQ_DATASET: loot_dw        # 👈 dataset de produção
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PORT: "5432"
          IDEMPOTENCY_TTL_MINUTES: "15"

          EOF

      - name: Deploy Cloud Run service
        run: |
          gcloud run deploy events-consumer-clickup \
            --region=us-east1 \
            --source=. \
            --clear-base-image \
            --service-account=sa-webhooks@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --cpu=1 \
            --memory=512Mi \
            --timeout=60s \
            --concurrency=1 \
            --min-instances=0 \
            --max-instances=5 \
            --allow-unauthenticated \
            --add-cloudsql-instances=${{ secrets.DB_CONNECTION_NAME }} \
            --env-vars-file=.env.yaml \
            --verbosity=debug
